services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  core:
    build: ./core
    depends_on: [redis]
    environment:
      - REDIS_URL=redis://redis:6379

  replica-1:
    build:
      context: .
      dockerfile: Dockerfile.replica
    ports: ["8001:8001"]
    depends_on: [redis]
    environment:
      - REPLICA_ID=rep-1
      - PORT=8001
      - REDIS_URL=redis://redis:6379

  replica-2:
    build:
      context: .
      dockerfile: Dockerfile.replica
    ports: ["8002:8002"]
    depends_on: [redis]
    environment:
      - REPLICA_ID=rep-2
      - PORT=8002
      - REDIS_URL=redis://redis:6379

  ui:
    build: ./ui
    ports: ["3000:80"]
